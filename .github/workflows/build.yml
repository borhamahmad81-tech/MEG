name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Locate project root (finds main.py wherever it landed in the repo)
        id: locate
        shell: pwsh
        run: |
          $found = Get-ChildItem -Path . -Recurse -Filter main.py -File | Select-Object -First 1
          if (-not $found) {
            throw "Could not find main.py anywhere in the repository. Make sure it was committed."
          }
          $projectDir = $found.DirectoryName
          Write-Host "Found main.py in: $projectDir"
          echo "PROJECT_DIR=$projectDir" >> $env:GITHUB_ENV

      - name: Install dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          pyinstaller --noconfirm --onefile --windowed --name SafetyEventAssistant `
            --collect-all customtkinter `
            --collect-all selenium `
            --collect-all pandas `
            --add-data "config;config" `
            --add-data "Master_Rules_Matrix_Final.xlsx;." `
            main.py

      - name: Show PyInstaller missing-modules report
        if: always()
        working-directory: ${{ env.PROJECT_DIR }}
        shell: pwsh
        run: |
          $warnFile = "build\SafetyEventAssistant\warn-SafetyEventAssistant.txt"
          if (Test-Path $warnFile) {
            Write-Host "----- warn-SafetyEventAssistant.txt -----"
            Get-Content $warnFile
          } else {
            Write-Host "Warn file not found at $warnFile"
          }
          if (Test-Path "dist\SafetyEventAssistant.exe") {
            $size = (Get-Item "dist\SafetyEventAssistant.exe").Length / 1MB
            Write-Host "EXE size: $size MB"
          }

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: SafetyEventAssistant-windows-exe
          path: ${{ env.PROJECT_DIR }}\dist\SafetyEventAssistant.exe
