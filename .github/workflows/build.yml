name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Locate project root (finds main.py wherever it landed in the repo)
        id: locate
        shell: pwsh
        run: |
          $found = Get-ChildItem -Path . -Recurse -Filter main.py -File | Select-Object -First 1
          if (-not $found) {
            throw "Could not find main.py anywhere in the repository. Make sure it was committed."
          }
          $projectDir = $found.DirectoryName
          Write-Host "Found main.py in: $projectDir"
          echo "PROJECT_DIR=$projectDir" >> $env:GITHUB_ENV

      - name: Install dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          pyinstaller --noconfirm --onefile --windowed --name SafetyEventAssistant `
            --collect-all customtkinter `
            --collect-all selenium `
            --collect-all pandas `
            main.py

      - name: Assemble release folder (exe + editable data files together)
        working-directory: ${{ env.PROJECT_DIR }}
        shell: pwsh
        run: |
          $release = "release\SafetyEventAssistant"
          New-Item -ItemType Directory -Force -Path $release | Out-Null
          Copy-Item "dist\SafetyEventAssistant.exe" $release
          Copy-Item "Master_Rules_Matrix_Final.xlsx" $release -ErrorAction SilentlyContinue
          Copy-Item "bulk_upload_template.xlsx" $release -ErrorAction SilentlyContinue
          Copy-Item "config" "$release\config" -Recurse -ErrorAction SilentlyContinue
          Copy-Item "launch_chrome_debug.bat" $release -ErrorAction SilentlyContinue
          Copy-Item "launch_edge_debug.bat" $release -ErrorAction SilentlyContinue
          Copy-Item "README.md" $release -ErrorAction SilentlyContinue
          Write-Host "----- Release folder contents -----"
          Get-ChildItem -Recurse $release | Format-Table FullName, Length

      - name: Upload release folder artifact
        uses: actions/upload-artifact@v4
        with:
          name: SafetyEventAssistant-windows
          path: ${{ env.PROJECT_DIR }}\release\SafetyEventAssistant
